name: Auto Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  NODE_VERSION: '20'

jobs:
  detect-and-deploy:
    name: Detect & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers (health monitor)
        if: hashFiles('workers/') != ''
        uses: cloudflare/wrangler-action@a08dc762e87e24e6e0571f6fbaba18e87e72be48 # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers
          command: deploy

      - name: Deploy to Railway
        if: secrets.RAILWAY_TOKEN != ''
        run: |
          npm i -g @railway/cli@3.20.0
          railway up --service ${{ github.event.repository.name }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  health-check:
    name: Post-Deploy Health Check
    needs: detect-and-deploy
    if: always() && needs.detect-and-deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment propagation
        run: sleep 30

      - name: Verify health endpoint
        if: env.DEPLOY_URL != ''
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.DEPLOY_URL }}/api/health" || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "000" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi

      - name: Deployment verified
        run: echo "Deployment pipeline completed successfully"
