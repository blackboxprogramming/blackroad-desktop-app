name: Self-Healing Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Deploy"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    name: Monitor Deployments
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check deployment health
        id: health
        run: |
          DEPLOY_URL="${{ secrets.DEPLOY_URL }}"
          if [ -z "$DEPLOY_URL" ]; then
            echo "status=skip" >> $GITHUB_OUTPUT
            echo "No DEPLOY_URL configured, skipping health check"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$DEPLOY_URL/api/health" || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Health check returned: $STATUS"

      - name: Create issue on failure
        if: steps.health.outputs.status != '200' && steps.health.outputs.status != 'skip'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deployment,auto-generated'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Self-Healing: Deployment Health Check Failed',
                body: `Health check failed.\n\nStatus: ${{ steps.health.outputs.status }}\nWorkflow: ${context.workflow}\nRun: ${context.runId}\nTimestamp: ${new Date().toISOString()}`,
                labels: ['bug', 'deployment', 'auto-generated']
              });
            }

  dependency-updates:
    name: Check Dependency Freshness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'

      - name: Check for outdated packages
        run: |
          if [ -f "package.json" ]; then
            npm outdated || true
          fi
